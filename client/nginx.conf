server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── SPA routing ───────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Never cache index.html or service worker ──────────────────
    # These are the entry points — must always be fresh so the
    # browser picks up new hashed JS/CSS bundles immediately.
    location ~* ^/(index\.html|sw\.js|workbox.*\.js|registerSW\.js|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # ── Cache hashed assets forever ───────────────────────────────
    # Vite puts a content hash in every JS/CSS filename (e.g. index-3f8a2b.js)
    # so it's safe to cache these for a year — new build = new hash = new URL.
    location ~* /assets/.*\.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── robots.txt and sitemap — short cache ──────────────────────
    location ~* ^/(robots\.txt|sitemap\.xml)$ {
        add_header Cache-Control "public, max-age=86400";
    }

    gzip on;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        text/javascript
        image/svg+xml;
}
