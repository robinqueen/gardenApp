        "7-day weather forecast",

    <div id="root"></div>

    <!--
      Shown only when JavaScript is disabled or not executed (e.g. some crawlers).
      Real users always see the React app above — noscript content is invisible to them.
    -->
    <noscript>
      <div style="font-family:system-ui,sans-serif;max-width:900px;margin:2rem auto;padding:1.5rem;color:#1a3a1f;line-height:1.6;">
        <header style="display:flex;align-items:center;gap:0.6rem;margin-bottom:2rem;border-bottom:1px solid #d4e6d4;padding-bottom:1rem;">
          <span style="font-size:1.4rem;">🌿</span>
          <strong style="font-size:1.05rem;color:#3a7d44;">My Living Garden</strong>
          <nav style="margin-left:auto;font-size:0.875rem;">
            <a href="/guide" style="color:#3a7d44;margin-right:1rem;">Planting Guide</a>
            <a href="/seeds" style="color:#3a7d44;">Seed Catalog</a>
          </nav>
        </header>

        <h1 style="font-size:2rem;font-weight:800;margin:0 0 0.75rem;">Free Vegetable Garden Planner</h1>
        <p style="font-size:1.05rem;color:#3d5c42;margin:0 0 1.5rem;">
          Map raised beds, calculate seed-starting dates, and build your full planting calendar —
          free, offline, no account needed.
        </p>

        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1rem;margin-bottom:2rem;">
          <div style="background:#f4faf4;border:1px solid #c8e0c8;border-radius:8px;padding:1rem;">
            <h2 style="font-size:1rem;font-weight:700;margin:0 0 0.4rem;">🛏️ Visual Bed Planner</h2>
            <p style="font-size:0.875rem;color:#3d5c42;margin:0;">Map every raised bed and container on an interactive grid with automatic spacing guidance.</p>
          </div>
          <div style="background:#f4faf4;border:1px solid #c8e0c8;border-radius:8px;padding:1rem;">
            <h2 style="font-size:1rem;font-weight:700;margin:0 0 0.4rem;">🌱 Seed Starting Calculator</h2>
            <p style="font-size:0.875rem;color:#3d5c42;margin:0;">Enter your zip code and get exact indoor-start dates for every vegetable and herb.</p>
          </div>
          <div style="background:#f4faf4;border:1px solid #c8e0c8;border-radius:8px;padding:1rem;">
            <h2 style="font-size:1rem;font-weight:700;margin:0 0 0.4rem;">📅 Planting Calendar</h2>
            <p style="font-size:0.875rem;color:#3d5c42;margin:0;">Your full season schedule auto-generates from seed tray prep through harvest.</p>
          </div>
          <div style="background:#f4faf4;border:1px solid #c8e0c8;border-radius:8px;padding:1rem;">
            <h2 style="font-size:1rem;font-weight:700;margin:0 0 0.4rem;">🔄 Succession Gap Finder</h2>
            <p style="font-size:0.875rem;color:#3d5c42;margin:0;">After harvest, the app spots open bed windows and suggests crops you can still fit in.</p>
          </div>
          <div style="background:#f4faf4;border:1px solid #c8e0c8;border-radius:8px;padding:1rem;">
            <h2 style="font-size:1rem;font-weight:700;margin:0 0 0.4rem;">🌦️ 7-Day Weather Forecast</h2>
            <p style="font-size:0.875rem;color:#3d5c42;margin:0;">Local forecast with freeze alerts so you know before you transplant.</p>
          </div>
          <div style="background:#f4faf4;border:1px solid #c8e0c8;border-radius:8px;padding:1rem;">
            <h2 style="font-size:1rem;font-weight:700;margin:0 0 0.4rem;">📋 Harvest &amp; Activity Log</h2>
            <p style="font-size:0.875rem;color:#3d5c42;margin:0;">Track waterings, harvests, and observations. Build a season-over-season record.</p>

          <a href="/terms" style="color:#3a7d44;">Terms</a> ·
          <a href="/privacy" style="color:#3a7d44;">Privacy</a>
        </p>
        <p style="font-size:0.875rem;color:#888;margin-top:1.5rem;">Please enable JavaScript to use My Living Garden.</p>

    <script type="module" src="/src/main.tsx"></script>

</html>
