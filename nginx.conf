server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the SPA — any path that doesn't match a real file falls back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets forever (Vite fingerprints JS/CSS filenames)
    location ~* \.(js|css|woff2?|glb|gltf|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache the HTML itself (so PWA update kicks in immediately)
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
